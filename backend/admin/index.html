<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔧 Painel Admin - MotoPeças</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Carregar script principal -->
    <script src="script.js" defer></script>
  </head>
  <body class="bg-gray-100 min-h-screen font-sans">
    <div class="flex h-screen">
      <!-- Menu Lateral -->
      <aside class="w-64 bg-blue-800 text-white">
        <div class="p-6">
          <h1 class="text-xl font-bold">Admin MotoPeças</h1>
        </div>
        <nav class="mt-4">
          <a
            href="#"
            data-page="produtos"
            class="block py-3 px-6 bg-blue-900 font-medium"
            >Produtos</a
          >
          <a
            href="#"
            data-page="categorias"
            class="block py-3 px-6 hover:bg-blue-700"
            >Categorias</a
          >
          <a
            href="#"
            data-page="itemDoDia"
            class="block py-3 px-6 hover:bg-blue-700"
            >Item do Dia</a
          >
        </nav>
      </aside>

      <!-- Conteúdo Principal -->
      <main id="adminContent" class="flex-1 p-6 overflow-y-auto bg-gray-50">
        <!-- Carregado dinamicamente pelos componentes -->
      </main>
    </div>

    <!-- Mensagem de feedback -->
    <div
      id="mensagem"
      class="hidden p-4 rounded-lg text-center font-medium mt-6"
    ></div>
  </body>
</html>
