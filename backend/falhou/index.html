<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔧 Painel Admin - MotoPeças</title>

    <!-- Carrega o Tailwind CSS diretamente via CDN (ideal para desenvolvimento) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Configuração personalizada do Tailwind -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- Fonte externa para melhorar a tipografia -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Carrega o script principal do painel admin -->
    <!-- O 'defer' garante que o script só rode após o HTML ser carregado -->
    <script src="script.js" defer></script>
  </head>
  <body class="bg-gray-50 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
      <!-- Cabeçalho do painel -->
      <header class="text-center mb-8">
        <h1
          class="text-3xl font-bold text-blue-800 flex items-center justify-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.99.608 2.296.07 2.572-1.065z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
          Painel Admin - MotoPeças
        </h1>
        <p class="text-gray-600 mt-2">Gerencie seus produtos e promoções</p>
      </header>

      <!-- Formulário de cadastro/edição de produtos -->
      <form id="formProduto" class="bg-white shadow-lg rounded-lg p-6 mb-8">
        <!-- Título dinâmico (muda entre "Cadastrar" e "Editar") -->
        <h2
          id="tituloForm"
          class="text-2xl font-semibold text-gray-800 mb-6 flex items-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 text-green-600"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 6v6m0 0v6m0-6h6m-6 0H6"
            />
          </svg>
          Cadastrar Produto
        </h2>

        <!-- Campo oculto para armazenar o ID do produto durante a edição -->
        <input type="hidden" id="produtoId" />

        <!-- Grid de campos do formulário -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nome do produto</label
            >
            <input
              required
              name="nome"
              placeholder="Ex: Kit Coroa e Pinhão"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Preço normal (R$)</label
            >
            <input
              type="number"
              step="0.01"
              required
              name="preco"
              placeholder="299.90"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Preço promocional (R$)</label
            >
            <input
              type="number"
              step="0.01"
              name="precoPromocional"
              placeholder="249.90"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Imagem Principal</label
            >
            <input
              type="file"
              accept="image/*"
              id="uploadImagemPrincipal"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm"
            />
            <div id="previewImagemPrincipal" class="mt-2"></div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Galeria de Imagens</label
            >
            <input
              type="file"
              accept="image/*"
              id="uploadGaleria"
              multiple
              class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm"
            />
            <div id="previewGaleria" class="flex flex-wrap gap-2 mt-2"></div>
          </div>
        </div>

        <!-- Campo de descrição -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Descrição</label
          >
          <textarea
            name="descricao"
            placeholder="Detalhes do produto..."
            rows="3"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
          ></textarea>
        </div>

        <!-- Checkbox para "Item do Dia" -->
        <div class="flex items-center mb-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input
              type="checkbox"
              name="itemDoDia"
              class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
            />
            <span class="text-sm font-medium text-gray-700"
              >Marcar como <strong>"Item do Dia"</strong></span
            >
          </label>
        </div>

        <!-- Container para exibir imagens durante edição -->
        <div id="containerImagensEdicao" class="hidden mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2"
            >Imagens do Produto</label
          >
          <div id="listaImagensEdicao" class="flex flex-wrap gap-2"></div>
          <button
            type="button"
            id="btnAdicionarImagem"
            class="mt-2 text-sm text-blue-600 hover:underline"
          >
            + Adicionar mais imagens
          </button>
        </div>

        <!-- Exibe os links das imagens salvas (após upload) -->
        <div
          id="campoLinksImagens"
          class="hidden mt-4 p-3 bg-gray-100 rounded text-sm"
        >
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Links das Imagens Salvas</label
          >
          <div id="listaLinksImagens"></div>
        </div>

        <!-- Botões de ação -->
        <div class="flex flex-col sm:flex-row gap-3 pt-4">
          <!-- Botão principal: muda entre "Cadastrar" e "Salvar Alterações" -->
          <button
            type="submit"
            id="btnSubmit"
            class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg shadow transition transform hover:scale-105 flex items-center justify-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                id="btnIcon"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
            <span id="btnText">Cadastrar Produto</span>
          </button>

          <!-- Botão para cancelar edição -->
          <button
            type="button"
            id="btnCancelarEdicao"
            class="hidden sm:flex items-center justify-center gap-2 bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-3 px-6 rounded-lg transition"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
            Cancelar
          </button>
        </div>
      </form>

      <!-- Tabela de produtos cadastrados -->
      <div class="bg-white shadow-lg rounded-lg p-6">
        <h2
          class="text-2xl font-semibold text-gray-800 mb-4 flex items-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 text-gray-700"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 10h16M4 14h16M4 18h16"
            />
          </svg>
          Produtos Cadastrados
        </h2>
        <table class="min-w-full divide-y divide-gray-200">
          <thead>
            <tr>
              <th class="py-2 text-left text-sm font-medium text-gray-700">
                Produto
              </th>
              <th class="py-2 text-left text-sm font-medium text-gray-700">
                Preço
              </th>
              <th class="py-2 text-left text-sm font-medium text-gray-700">
                Item do Dia
              </th>
              <th class="py-2 text-left text-sm font-medium text-gray-700">
                Ações
              </th>
            </tr>
          </thead>
          <tbody id="listaProdutos" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>

      <!-- Mensagem de feedback (sucesso, erro, etc.) -->
      <div
        id="mensagem"
        class="hidden p-4 rounded-lg text-center font-medium mt-6"
      ></div>
    </div>
  </body>
</html>
