<!DOCTYPE html>
<html>

<head>
  <title>Teste Upload</title>
</head>

<body>
  <input type="file" id="testUpload" multiple />
  <button onclick="enviar()">Enviar</button>
  <div idmsg"></div>

  <script>
    async function enviar() {
      const input = document.getElementById("testUpload");
      const files = Array.from(input.files);
      const formData = new FormData();
      files.forEach(f => formData.append("imagens", f));

      try {
        const res = await fetch("http://localhost:5000/api/upload-multiple", {
          method: "POST",
          body: formData
        });
        const json = await res.json();
        document.getElementById("msg").innerText = JSON.stringify(json, null, 2);
        console.log("✅ Resposta:", json);
      } catch (e) {
        document.getElementById("msg").innerText = "Erro: " + e.message;
        console.error(e);
      }
    }
  </script>
</body>

</html>
