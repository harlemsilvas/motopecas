<!DOCTYPE html>
<html lang="pt-br">
	<head>
		    <meta charset="UTF-8">
		        <meta name="viewport" content="width=device-width, initial-scale=1.0">
			    <title>MotoSpeed | Peças em Promoção</title>
			        <style>
        /* --- RESET E VARIÁVEIS --- */
        :root {
		            --primary: #ff4500; /* Laranja esportivo */
			                --dark: #121212;
					            --card-bg: #1e1e1e;
						                --text-light: #f5f5f5;
								            --text-gray: #a0a0a0;
									            }

	        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

		        body {
				            background-color: var(--dark);
					                color: var(--text-light);
							        }

			        /* --- HEADER --- */
			        header {
					            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
						                background-size: cover;
								            background-position: center;
									                height: 300px;
											            display: flex;
												                flex-direction: column;
														            justify-content: center;
															                align-items: center;
																	            text-align: center;
																		                border-bottom: 4px solid var(--primary);
																				        }

				        header h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
					        header p { font-size: 1.2rem; color: var(--text-gray); }
						        header span { color: var(--primary); font-weight: bold; }

							        /* --- CONTAINER PRINCIPAL --- */
							        .container {
									            max-width: 1200px;
										                margin: 0 auto;
												            padding: 40px 20px;
													            }

								        .section-title {
										            text-align: center;
											                margin-bottom: 40px;
													            font-size: 2rem;
														                position: relative;
																        }
									        
									        .section-title::after {
											            content: '';
												                display: block;
														            width: 60px;
															                height: 3px;
																	            background: var(--primary);
																		                margin: 10px auto;
																				        }

										        /* --- GRID DE PRODUTOS --- */
										        .products-grid {
												            display: grid;
													                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
															            gap: 30px;
																            }

											        /* --- CARD DO PRODUTO --- */
											        .product-card {
													            background-color: var(--card-bg);
														                border-radius: 8px;
																            overflow: hidden;
																	                transition: transform 0.3s ease, box-shadow 0.3s ease;
																			            position: relative;
																				                border: 1px solid #333;
																						        }

												        .product-card:hover {
														            transform: translateY(-5px);
															                box-shadow: 0 10px 20px rgba(255, 69, 0, 0.2);
																	            border-color: var(--primary);
																		            }

													        .badge {
															            position: absolute;
																                top: 10px;
																		            right: 10px;
																			                background-color: var(--primary);
																					            color: white;
																						                padding: 5px 10px;
																								            font-size: 0.8rem;
																									                font-weight: bold;
																											            border-radius: 4px;
																												                z-index: 2;
																														        }

														        .product-image {
																            width: 100%;
																	                height: 200px;
																			            object-fit: cover;
																				                background-color: #333; /* Placeholder color */
																						        }

															        .product-info { padding: 20px; }
																        
																        .product-title { font-size: 1.2rem; margin-bottom: 10px; color: var(--text-light); }
																	        
																	        .price-container {
																			            display: flex;
																				                align-items: center;
																						            gap: 10px;
																							                margin-bottom: 15px;
																									        }

																		        .old-price { text-decoration: line-through; color: var(--text-gray); font-size: 0.9rem; }
																			        .new-price { color: var(--primary); font-size: 1.5rem; font-weight: bold; }

																				        .btn-buy {
																						            display: block;
																							                width: 100%;
																									            padding: 12px;
																										                background-color: transparent;
																												            border: 2px solid var(--primary);
																													                color: var(--primary);
																															            text-align: center;
																																                text-decoration: none;
																																		            font-weight: bold;
																																			                border-radius: 4px;
																																					            transition: all 0.3s;
																																						                cursor: pointer;
																																								        }

																					        .btn-buy:hover {
																							            background-color: var(--primary);
																								                color: white;
																										        }

																						        /* --- FOOTER --- */
																						        footer {
																								            text-align: center;
																									                padding: 40px;
																											            margin-top: 50px;
																												                background-color: #0a0a0a;
																														            color: var(--text-gray);
																															                border-top: 1px solid #333;
																																	        }

																							        /* Responsividade para celular */
																							        @media (max-width: 600px) {
																									            header h1 { font-size: 2rem; }
																										                .products-grid { grid-template-columns: 1fr; }
																												        }
																								    </style>
	</head>
	<body>

		    <header>
			            <h1>Moto<span>Speed</span></h1>
				            <p>As melhores peças com os melhores preços.</p>
					        </header>

						    <div class="container">
							            <h2 class="section-title">Ofertas do Dia (Aleatórias)</h2>
								            
								            <!-- Aqui os produtos serão injetados via JavaScript -->
									            <div id="products-container" class="products-grid"></div>
										        </div>

											    <footer>
												            <p>&copy; 2023 MotoSpeed Peças. Todos os direitos reservados.</p>
													            <p>Rua das Motos, 123 - São Paulo, SP</p>
														        </footer>

															    <script>
																            // 1. BANCO DE DADOS (Simulação)
																            // Coloquei 10 produtos aqui, mas o sistema só vai mostrar 6.
																            // Você pode adicionar quantos quiser nesta lista.
																            const database = [
																		                { id: 1, name: "Capacete X-Pro Carbono", oldPrice: 899.90, newPrice: 649.90, img: "https://images.unsplash.com/photo-1595180638498-194b70598496?auto=format&fit=crop&w=500&q=60" },
																		                { id: 2, name: "Óleo Motul 7100 10W40", oldPrice: 65.00, newPrice: 49.90, img: "https://images.unsplash.com/photo-1585829365295-ab7cd400c167?auto=format&fit=crop&w=500&q=60" },
																		                { id: 3, name: "Pneu Michelin Pilot Road", oldPrice: 550.00, newPrice: 420.00, img: "https://images.unsplash.com/photo-1578844251758-2f71da645217?auto=format&fit=crop&w=500&q=60" },
																		                { id: 4, name: "Escape Esportivo Akrapovic", oldPrice: 1200.00, newPrice: 950.00, img: "https://images.unsplash.com/photo-1625043484555-47841a752840?auto=format&fit=crop&w=500&q=60" },
																		                { id: 5, name: "Kit Relação Gold", oldPrice: 180.00, newPrice: 129.90, img: "https://images.unsplash.com/photo-1616422285623-13ff0162193c?auto=format&fit=crop&w=500&q=60" },
																		                { id: 6, name: "Jaqueta Couro Racing", oldPrice: 450.00, newPrice: 320.00, img: "https://images.unsplash.com/photo-1596767579298-14779622835d?auto=format&fit=crop&w=500&q=60" },
																		                { id: 7, name: "Luvas de Proteção", oldPrice: 89.90, newPrice: 59.90, img: "https://images.unsplash.com/photo-1599839575945-a9e5af0c3fa5?auto=format&fit=crop&w=500&q=60" },
																		                { id: 8, name: "Bateria Moura 12V", oldPrice: 220.00, newPrice: 180.00, img: "https://images.unsplash.com/photo-1616766098956-c81f12114571?auto=format&fit=crop&w=500&q=60" },
																		                { id: 9, name: "Farol Auxiliar LED", oldPrice: 150.00, newPrice: 99.90, img: "https://images.unsplash.com/photo-1550601936-2e8c89e8688a?auto=format&fit=crop&w=500&q=60" },
																		                { id: 10, name: "Suporte Celular Moto", oldPrice: 45.00, newPrice: 29.90, img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=500&q=60" }
																		            ];

																	            // 2. FUNÇÃO DE EMBARALHAR (Algoritmo Fisher-Yates)
																	            function shuffleArray(array) {
																			                for (let i = array.length - 1; i > 0; i--) {
																						                const j = Math.floor(Math.random() * (i + 1));
																						                [array[i], array[j]] = [array[j], array[i]];
																						            }
																			                return array;
																			            }

																	            // 3. LÓGICA DE EXIBIÇÃO
																	            function renderProducts() {
																			                const container = document.getElementById('products-container');
																			                
																			                // Cria uma cópia do banco de dados para não alterar o original
																			                const shuffledProducts = shuffleArray([...database]);
																			                
																			                // Pega apenas os primeiros 6 itens após embaralhar
																			                const selectedProducts = shuffledProducts.slice(0, 6);

																			                // Gera o HTML
																			                selectedProducts.forEach(product => {
																						                const card = `
																								                    <div class="product-card">
																										                            <span class="badge">OFERTA</span>
																													                            <img src="${product.img}" alt="${product.name}" class="product-image">
																																                            <div class="product-info">
																																			                                <h3 class="product-title">${product.name}</h3>
																																							                            <div class="price-container">
																																										                                    <span class="old-price">R$ ${product.oldPrice.toFixed(2).replace('.', ',')}</span>
																																														                                    <span class="new-price">R$ ${product.newPrice.toFixed(2).replace('.', ',')}</span>
																																																		                                </div>
																																																						                            <a href="#" class="btn-buy">COMPRAR AGORA</a>
																																																									                            </div>
																																																												                        </div>
																																																															                `;
																						                container.innerHTML += card;
																						            });
																			            }

																	            // 4. INICIALIZAR
																	            document.addEventListener('DOMContentLoaded', renderProducts);

																	        </script>
	</body>
</html>
